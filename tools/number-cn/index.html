<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#f1efe9"><title>人民币大写转换 · 何方 · 小站</title><link rel="icon" href="../../assets/icon.png" type="image/png"><link rel="apple-touch-icon" href="../../assets/icon.png"><link rel="stylesheet" href="../shared.css"><link rel="stylesheet" href="../site-nav.css"><link rel="stylesheet" href="../cursor.css"></head><body><header class="site-header"><nav class="shell site-nav" aria-label="站点导航"><a class="brand" href="../../index.html"><img class="brand-logo" src="../../assets/icon.png" alt="" width="28" height="28">何方 · 小站</a><div class="site-nav-links"><a href="../../index.html#works">工具</a><a href="../../blog/index.html">博客</a><a href="../../index.html#about">关于</a><a href="../../index.html#contact">动态</a></div></nav></header><main class="shell"><div class="eyebrow">金额工具 · 02</div><h1>人民币大写转换</h1><p class="lead">将数字金额转换为人民币财务大写，适合票据、合同和金额核对。</p><div class="tool-grid"><section class="panel"><div class="field"><label for="number">输入人民币金额</label><div class="input-wrap"><span class="unit">¥</span><input id="number" inputmode="decimal" placeholder="例如 123456.78" autocomplete="off"></div></div><div class="btns"><button class="btn" id="convert">转换为人民币大写</button><button class="btn secondary" id="clear">清空</button></div><div class="notice">支持负数和最多两位小数，结果按“元、角、分、整”的财务格式输出。</div></section><section class="panel accent" aria-live="polite"><div class="result-label">人民币大写</div><div class="output"><small>人民币大写金额</small><strong id="money">等待输入</strong><br><button class="copy" data-target="money">复制结果</button></div></section></div></main><script>const upper='零壹贰叁肆伍陆柒捌玖',numberEl=document.getElementById('number'),moneyEl=document.getElementById('money'),convertBtn=document.getElementById('convert'),clearBtn=document.getElementById('clear');function sectionCN(part){const units=['','拾','佰','仟'];let text='',pendingZero=false;for(let i=0;i<part.length;i++){const d=+part[i],pos=part.length-i-1;if(d){if(pendingZero&&text)text+=upper[0];text+=upper[d]+units[pos];pendingZero=false}else if(text)pendingZero=true}return text}function integerCN(value){value=String(BigInt(value||0));if(value==='0')return upper[0];const big=['','万','亿','兆','京'];let parts=[];while(value.length){parts.unshift(value.slice(-4));value=value.slice(0,-4)}let out='',zeroGap=false;for(let i=0;i<parts.length;i++){const val=+parts[i],level=parts.length-i-1;if(!val){if(out)zeroGap=true;continue}if(out&&(zeroGap||val<1000))out+=upper[0];out+=sectionCN(parts[i])+big[level];zeroGap=false}return out}function convertNumber(){const raw=numberEl.value.trim().replace(/,/g,'');if(!/^-?\d+(\.\d{0,2})?$/.test(raw)){moneyEl.textContent='请输入有效金额（最多两位小数）';return}const neg=raw.startsWith('-'),clean=raw.replace('-',''),[integer,decimal='']=clean.split('.'),yuan=integerCN(integer),jiao=+(decimal[0]||0),fen=+(decimal[1]||0);let tail='';if(jiao)tail+=upper[jiao]+'角';if(fen){if(!jiao&&BigInt(integer)>0n)tail+='零';tail+=upper[fen]+'分'}if(!jiao&&!fen)tail='整';moneyEl.textContent=(neg?'负':'')+yuan+'元'+tail}convertBtn.onclick=convertNumber;numberEl.addEventListener('keydown',e=>{if(e.key==='Enter')convertNumber()});clearBtn.onclick=()=>{numberEl.value='';moneyEl.textContent='等待输入';numberEl.focus()};document.querySelector('.copy').onclick=async function(){try{await navigator.clipboard.writeText(moneyEl.textContent);this.textContent='已复制';setTimeout(()=>this.textContent='复制结果',1200)}catch{this.textContent='请手动复制'}};</script><script src="../cursor.js"></script></body></html>
